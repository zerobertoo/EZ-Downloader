<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EZ Downloader</title>
    <link rel="stylesheet" href="styles.css" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:;"
    />
  </head>
  <body>
    <div class="noise-overlay" aria-hidden="true"></div>

    <div id="app">

      <!-- ── Titlebar ── -->
      <header class="app-header">
        <div class="header-brand">
          <div class="brand-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
              <path d="M9 2v9.5M9 11.5l-3.5-3.5M9 11.5l3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 15h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="brand-name">EZ<span class="brand-accent">Downloader</span></span>
        </div>
        <span id="version" class="version-chip">v0.0.0</span>
      </header>

      <!-- ── Scrollable body ── -->
      <div class="app-body">
        <div class="content-wrap">

          <!-- ════════════════ INPUT SECTION ════════════════ -->
          <section class="input-section">
            <div class="input-card">
              <div class="input-card-shimmer" aria-hidden="true"></div>

              <div class="input-hero">
                <div class="hero-eyebrow">
                  <span class="eyebrow-dot" aria-hidden="true"></span>
                  <span class="eyebrow-text">YouTube · TikTok · Instagram · Twitter · Twitch · +1000 sites</span>
                </div>
                <h1 class="hero-title">O que você quer<br><span class="hero-accent">baixar hoje?</span></h1>
              </div>

              <div class="url-row">
                <div class="url-field-wrap">
                  <svg class="url-prefix-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <input
                    type="text"
                    id="urlInput"
                    class="url-input"
                    placeholder="Cole a URL do vídeo aqui..."
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="URL do vídeo"
                  />
                </div>
                <button id="fetchFormatsBtn" class="fetch-btn" aria-label="Buscar formatos">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2.2"/>
                    <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                  </svg>
                  Buscar
                </button>
              </div>
            </div>
          </section>

          <!-- ════════════════ LOADING SECTION ════════════════ -->
          <section id="loadingSection" class="loading-section hidden" aria-live="polite" aria-busy="true">
            <div class="loading-card">
              <div class="loader-ring" aria-hidden="true">
                <div class="loader-arc"></div>
              </div>
              <div class="loading-text">
                <p class="loading-headline">Buscando informações...</p>
                <p class="loading-sub">Obtendo formatos disponíveis</p>
              </div>
            </div>
          </section>

          <!-- ════════════════ FORMATS SECTION ════════════════ -->
          <section id="formatsSection" class="formats-section hidden">

            <!-- Video metadata card -->
            <div id="videoCard" class="video-card hidden">
              <div class="thumb-wrap">
                <img id="videoThumbnail" class="video-thumb" alt="Thumbnail do vídeo" />
                <div class="thumb-scrim" aria-hidden="true"></div>
              </div>
              <div class="video-meta-panel">
                <h2 id="videoTitle" class="video-title-text"></h2>
                <p id="videoUploader" class="video-uploader-text"></p>
              </div>
            </div>

            <!-- Download configuration -->
            <div class="config-card">

              <!-- Format selector -->
              <div class="field-group">
                <label for="formatSelect" class="field-label">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  Formato
                </label>
                <div class="select-shell">
                  <select id="formatSelect" class="format-select" aria-label="Selecione o formato do vídeo">
                    <option value="">Carregando formatos...</option>
                  </select>
                  <svg class="select-caret" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <p id="formatInfo" class="format-meta" aria-live="polite"></p>
              </div>

              <div class="field-divider" role="separator" aria-hidden="true"></div>

              <!-- Destination path -->
              <div class="field-group">
                <label for="downloadPath" class="field-label">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  Destino
                </label>
                <div class="path-row">
                  <input
                    type="text"
                    id="downloadPath"
                    class="path-input"
                    placeholder="Selecionar pasta..."
                    readonly
                    aria-label="Caminho de download"
                  />
                  <button id="selectPathBtn" class="browse-btn">Procurar</button>
                </div>
              </div>

              <!-- Download trigger -->
              <button id="downloadBtn" class="download-btn">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                  <polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                  <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
                Iniciar Download
              </button>
            </div>
          </section>

          <!-- ════════════════ PROGRESS SECTION ════════════════ -->
          <section id="progressSection" class="progress-section hidden" aria-live="polite">
            <div class="progress-card">
              <div class="progress-card-halo" aria-hidden="true"></div>

              <div class="progress-header-row">
                <div class="progress-orb" aria-hidden="true">
                  <div class="orb-ring-outer"></div>
                  <div class="orb-core">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                      <polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                      <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                  </div>
                </div>
                <div class="progress-labels">
                  <p id="progressText" class="progress-status-text">Iniciando download...</p>
                  <p id="progressStats" class="progress-stats-text"></p>
                </div>
                <div id="progressPercent" class="progress-pct">0%</div>
              </div>

              <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
                <div id="progressFill" class="progress-fill"></div>
              </div>

              <button id="cancelBtn" class="cancel-btn">Cancelar download</button>
            </div>
          </section>

          <!-- ════════════════ SUCCESS SECTION ════════════════ -->
          <section id="successSection" class="outcome-section hidden">
            <div class="outcome-card">
              <div class="outcome-icon-cluster">
                <div class="outcome-pulse success-pulse" aria-hidden="true"></div>
                <div class="outcome-icon success-icon-bg">
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
              </div>
              <div class="outcome-body">
                <h2 class="outcome-title">Download concluído!</h2>
                <p id="successText" class="outcome-message"></p>
              </div>
              <div class="outcome-actions">
                <button id="openFolderBtn" class="outcome-btn success-btn">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  Abrir pasta
                </button>
                <button id="newDownloadBtn" class="outcome-btn ghost-btn">Novo download</button>
              </div>
            </div>
          </section>

          <!-- ════════════════ ERROR SECTION ════════════════ -->
          <section id="errorSection" class="outcome-section hidden">
            <div class="outcome-card">
              <div class="outcome-icon-cluster">
                <div class="outcome-pulse error-pulse" aria-hidden="true"></div>
                <div class="outcome-icon error-icon-bg">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                  </svg>
                </div>
              </div>
              <div class="outcome-body">
                <h2 class="outcome-title">Erro no download</h2>
                <p id="errorText" class="outcome-message error-msg-text"></p>
              </div>
              <div class="outcome-actions">
                <button id="retryBtn" class="outcome-btn amber-btn">Tentar novamente</button>
                <button id="resetBtn" class="outcome-btn ghost-btn">Voltar ao início</button>
              </div>
            </div>
          </section>

        </div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
